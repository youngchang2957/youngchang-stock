<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>넥스젠 / 영창직물 원단 재고조회</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --navy:#122238;--blue:#2457d6;--green:#178c5b;--red:#d54343;
      --orange:#e58b20;--gray:#6b7280;--line:#e5e7eb;--bg:#f5f7fa;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Noto Sans KR",Arial,sans-serif;background:var(--bg);color:#111827}
    header{background:var(--navy);color:#fff;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{font-size:21px;font-weight:800}.sub{font-size:12px;color:#cbd5e1;margin-top:3px}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.35);padding:9px 12px;border-radius:10px}
    main{max-width:980px;margin:38px auto;padding:0 16px 60px}
    .card{background:#fff;border-radius:18px;padding:26px;box-shadow:0 10px 30px rgba(15,23,42,.08)}
    h1,h2{margin-top:0} h1{font-size:27px;margin-bottom:8px}
    .desc{color:var(--gray);line-height:1.65;margin-bottom:22px}
    .search-row{display:flex;gap:10px}
    input,select,textarea{width:100%;border:1px solid #d1d5db;border-radius:12px;padding:13px 14px;outline:none;background:#fff}
    input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(36,87,214,.12)}
    textarea{min-height:92px;resize:vertical}
    .primary{border:0;background:var(--blue);color:#fff;border-radius:12px;padding:0 20px;font-weight:700;white-space:nowrap}
    .secondary{border:1px solid #cbd5e1;background:#fff;color:#1f2937;border-radius:10px;padding:10px 13px}
    .danger{border:0;background:#ef4444;color:#fff;border-radius:10px;padding:10px 13px}
    .result-area{display:none;margin-top:22px}.result-title{font-size:14px;color:var(--gray);margin-bottom:9px}.result-list{display:grid;gap:11px}
    .result-item{border:1px solid var(--line);border-radius:15px;padding:18px;background:#fff}
    .result-head{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .fabric-no{font-size:18px;font-weight:800;word-break:break-all}
    .status{font-weight:800;padding:7px 11px;border-radius:999px;font-size:13px;white-space:nowrap}
    .in{background:#dcfce7;color:#166534}.out{background:#fee2e2;color:#991b1b}.temp{background:#ffedd5;color:#9a3412}
    .public-details{margin-top:14px;display:grid;gap:8px}
    .detail-row{display:grid;grid-template-columns:100px 1fr;gap:10px;font-size:14px}
    .detail-label{color:var(--gray);font-weight:700}
    .detail-value{white-space:pre-wrap;word-break:break-word}
    .empty{padding:24px;text-align:center;background:#f3f4f6;color:#4b5563;border-radius:14px;font-weight:700}
    .admin{display:none}.toolbar{display:flex;gap:10px;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:18px}
    .form-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:12px}.full{grid-column:1/-1}.field label{display:block;font-size:13px;font-weight:700;color:#475569;margin:0 0 6px}
    .btn-row{display:flex;gap:9px;justify-content:flex-end;margin:16px 0 22px}
    .admin-search{display:flex;gap:9px;margin:10px 0 14px}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:14px}
    table{width:100%;border-collapse:collapse;min-width:820px}
    th,td{padding:14px 14px;border-bottom:1px solid var(--line);text-align:left;font-size:14px;vertical-align:middle}
    th{background:#f8fafc;color:#334155;font-weight:800}
    tr:last-child td{border-bottom:0}
    .small{font-size:12px;color:var(--gray)}
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);align-items:center;justify-content:center;padding:18px;z-index:30}
    .modal{width:min(420px,100%);background:#fff;border-radius:18px;padding:24px}
    .modal h2{margin-bottom:7px}.modal .field{margin-top:12px}.modal-actions{display:flex;gap:9px;justify-content:flex-end;margin-top:18px}
    .manage-buttons{display:flex;gap:6px}
    @media(max-width:640px){
      main{margin-top:24px}.card{padding:21px 17px}.search-row,.admin-search{flex-direction:column}.primary{min-height:48px}
      .form-grid{grid-template-columns:1fr}.detail-row{grid-template-columns:86px 1fr}
    }
  </style>
</head>
<body>
<header>
  <div>
    <div class="brand">넥스젠 / 영창직물</div>
    <div class="sub">원단 재고조회</div>
  </div>
  <button id="adminBtn" class="ghost">관리자</button>
</header>

<main>
  <section id="publicPanel" class="card">
    <h1>원단 재고를 조회하세요</h1>
    <div class="desc">
      원단번호 전체 또는 일부만 입력해도 됩니다.<br>
      예: <strong>VMT26001 → 26001</strong>, <strong>2472U 2/3 → 2/3</strong>
    </div>
    <div class="search-row">
      <input id="searchInput" placeholder="예: 26001 또는 2/3" autocomplete="off">
      <button id="searchBtn" class="primary">조회하기</button>
    </div>
    <div id="resultArea" class="result-area">
      <div id="resultTitle" class="result-title"></div>
      <div id="resultList" class="result-list"></div>
    </div>
  </section>

  <section id="adminPanel" class="card admin">
    <div class="toolbar">
      <div>
        <h2 style="margin-bottom:5px">원단 관리</h2>
        <div id="loginInfo" class="small"></div>
      </div>
      <div>
        <button id="publicBtn" class="secondary">조회화면</button>
        <button id="logoutBtn" class="secondary">로그아웃</button>
      </div>
    </div>

    <div class="form-grid">
      <div class="field">
        <label>원단번호</label>
        <input id="fabricNo" placeholder="예: VMT26001">
      </div>
      <div class="field">
        <label>재고 상태</label>
        <select id="stockStatus">
          <option value="in">있음</option>
          <option value="out">없음</option>
          <option value="temp">일시품절</option>
        </select>
      </div>
      <div class="field">
        <label>생산 상태</label>
        <select id="productionStatus">
          <option value="">선택 안 함</option>
          <option>생산 예정</option><option>생산중</option><option>생산 완료</option>
          <option>입고 예정</option><option>출고 준비중</option><option>출고 완료</option><option>단종</option>
        </select>
      </div>
      <div class="field">
        <label>출고 예정일</label>
        <input id="shipDate" type="date">
      </div>
      <div class="field full">
        <label>비고</label>
        <textarea id="memo" placeholder="예: 입고 예정 / 대체 원단 문의"></textarea>
      </div>
    </div>

    <div class="btn-row">
      <button id="clearBtn" class="secondary">초기화</button>
      <button id="saveBtn" class="primary">등록/수정</button>
    </div>

    <div class="admin-search">
      <input id="adminSearchInput" placeholder="관리 목록에서 원단번호 검색">
      <button id="adminSearchBtn" class="secondary">검색</button>
      <button id="loadRecentBtn" class="secondary">최근 100개</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>원단번호</th>
            <th>재고</th>
            <th>생산 상태</th>
            <th>출고 예정일</th>
            <th>비고</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="fabricTable"></tbody>
      </table>
    </div>
  </section>
</main>

<div id="loginModal" class="modal-bg">
  <div class="modal">
    <h2>관리자 로그인</h2>
    <div class="small">Supabase 관리자 이메일과 비밀번호를 입력하세요.</div>
    <div class="field"><label>이메일</label><input id="emailInput" type="email"></div>
    <div class="field"><label>비밀번호</label><input id="passwordInput" type="password"></div>
    <div class="modal-actions">
      <button id="closeLoginBtn" class="secondary">취소</button>
      <button id="loginBtn" class="primary" style="min-height:42px">로그인</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://dweixpdixipyklwotuzv.supabase.co";
  const SUPABASE_KEY = "sb_publishable_fCZlfsRXOoVM-OlzaZv3_Q_pQIMQRnY";

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const statusText = { in:"있음", out:"없음", temp:"일시품절" };
  let editingId = null;

  const $ = id => document.getElementById(id);
  function esc(v){ return String(v||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }
  function formatDate(v){ if(!v)return ""; const [y,m,d]=v.split("-"); return `${y}.${m}.${d}`; }

  async function searchPublic(){
    const q = $("searchInput").value.trim();
    $("resultArea").style.display = "block";
    $("resultTitle").textContent = "";
    $("resultList").innerHTML = "";

    if(!q){
      $("resultList").innerHTML='<div class="empty">원단번호를 입력해주세요.</div>';
      return;
    }

    const {data,error} = await client
      .from("fabrics")
      .select("id,fabric_no,stock_status,ship_date,memo")
      .ilike("fabric_no", `%${q}%`)
      .order("fabric_no", {ascending:true})
      .limit(100);

    if(error){
      $("resultList").innerHTML=`<div class="empty">조회 오류: ${esc(error.message)}</div>`;
      return;
    }

    const rows = data || [];

    if(!rows.length){
      $("resultList").innerHTML='<div class="empty">조회되는 원단번호가 없습니다.</div>';
      return;
    }

    $("resultTitle").textContent = `검색 결과 ${rows.length}건${rows.length===100?" (최대 100건 표시)":""}`;

    rows.forEach(item=>{
      const details = [];
      if(item.stock_status === "temp" && item.ship_date){
        details.push(`<div class="detail-row"><div class="detail-label">입고 예정일</div><div class="detail-value">${formatDate(item.ship_date)}</div></div>`);
      }
      if(item.stock_status === "temp" && item.memo){
        details.push(`<div class="detail-row"><div class="detail-label">비고</div><div class="detail-value">${esc(item.memo)}</div></div>`);
      }

      const div=document.createElement("div");
      div.className="result-item";
      div.innerHTML=`
        <div class="result-head">
          <div class="fabric-no">${esc(item.fabric_no)}</div>
          <div class="status ${item.stock_status}">${statusText[item.stock_status]||esc(item.stock_status)}</div>
        </div>
        ${details.length ? `<div class="public-details">${details.join("")}</div>` : ""}
      `;
      $("resultList").appendChild(div);
    });
  }

  async function showAdmin(){
    const {data:{session}} = await client.auth.getSession();
    if(!session){ $("loginModal").style.display="flex"; return; }
    $("loginInfo").textContent = `${session.user.email} 로그인 중`;
    $("publicPanel").style.display="none";
    $("adminPanel").style.display="block";
    loadRecent();
  }

  async function login(){
    const email=$("emailInput").value.trim();
    const password=$("passwordInput").value;
    const {error}=await client.auth.signInWithPassword({email,password});
    if(error) return alert("로그인 실패: "+error.message);
    $("loginModal").style.display="none";
    showAdmin();
  }

  async function logout(){
    await client.auth.signOut();
    $("adminPanel").style.display="none";
    $("publicPanel").style.display="block";
  }

  function clearForm(){
    editingId=null;
    $("fabricNo").value="";
    $("stockStatus").value="in";
    $("productionStatus").value="";
    $("shipDate").value="";
    $("memo").value="";
  }

  async function saveFabric(){
    const fabric_no=$("fabricNo").value.trim();
    if(!fabric_no) return alert("원단번호를 입력해주세요.");

    const payload={
      fabric_no,
      stock_status:$("stockStatus").value,
      production_status:$("productionStatus").value||null,
      ship_date:$("shipDate").value||null,
      memo:$("memo").value.trim()||null,
      updated_at:new Date().toISOString()
    };

    let result;
    if(editingId){
      result=await client.from("fabrics").update(payload).eq("id",editingId);
    }else{
      result=await client.from("fabrics").insert(payload);
    }

    if(result.error) return alert("저장 실패: "+result.error.message);
    alert("저장되었습니다.");
    clearForm();
    loadRecent();
  }

  async function loadRecent(){
    const {data,error}=await client
      .from("fabrics")
      .select("*")
      .order("updated_at",{ascending:false})
      .limit(100);

    if(error) return renderTable([],error.message);
    renderTable(data || []);
  }

  async function searchAdmin(){
    const q=$("adminSearchInput").value.trim();
    if(!q) return loadRecent();

    const {data,error}=await client
      .from("fabrics")
      .select("*")
      .ilike("fabric_no",`%${q}%`)
      .order("fabric_no")
      .limit(100);

    if(error) return renderTable([],error.message);
    renderTable(data || []);
  }

  function renderTable(rows,errorMsg=""){
    const tbody=$("fabricTable");
    tbody.innerHTML="";

    if(errorMsg){
      tbody.innerHTML=`<tr><td colspan="6">오류: ${esc(errorMsg)}</td></tr>`;
      return;
    }

    if(!rows.length){
      tbody.innerHTML='<tr><td colspan="6" style="text-align:center;padding:28px">표시할 원단이 없습니다.</td></tr>';
      return;
    }

    rows.forEach(item=>{
      const tr=document.createElement("tr");
      tr.innerHTML=`
        <td><strong>${esc(item.fabric_no)}</strong></td>
        <td>${statusText[item.stock_status]||esc(item.stock_status)}</td>
        <td>${esc(item.production_status||"-")}</td>
        <td>${esc(formatDate(item.ship_date)||"-")}</td>
        <td>${esc(item.memo||"-")}</td>
        <td>
          <div class="manage-buttons">
            <button class="secondary edit" data-id="${item.id}">수정</button>
            <button class="danger del" data-id="${item.id}">삭제</button>
          </div>
        </td>`;
      tbody.appendChild(tr);
    });

    tbody.querySelectorAll(".edit").forEach(btn=>btn.onclick=async()=>{
      const {data,error}=await client.from("fabrics").select("*").eq("id",btn.dataset.id).single();
      if(error)return alert(error.message);
      editingId=data.id;
      $("fabricNo").value=data.fabric_no;
      $("stockStatus").value=data.stock_status;
      $("productionStatus").value=data.production_status||"";
      $("shipDate").value=data.ship_date||"";
      $("memo").value=data.memo||"";
      window.scrollTo({top:0,behavior:"smooth"});
    });

    tbody.querySelectorAll(".del").forEach(btn=>btn.onclick=async()=>{
      if(!confirm("이 원단을 삭제할까요?"))return;
      const {error}=await client.from("fabrics").delete().eq("id",btn.dataset.id);
      if(error)return alert("삭제 실패: "+error.message);
      loadRecent();
    });
  }

  $("searchBtn").onclick=searchPublic;
  $("searchInput").onkeydown=e=>{if(e.key==="Enter")searchPublic()};
  $("adminBtn").onclick=showAdmin;
  $("publicBtn").onclick=()=>{$("adminPanel").style.display="none";$("publicPanel").style.display="block"};
  $("logoutBtn").onclick=logout;
  $("loginBtn").onclick=login;
  $("closeLoginBtn").onclick=()=>$("loginModal").style.display="none";
  $("clearBtn").onclick=clearForm;
  $("saveBtn").onclick=saveFabric;
  $("adminSearchBtn").onclick=searchAdmin;
  $("loadRecentBtn").onclick=loadRecent;
</script>
</body>
</html>
