<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>넥스젠/영창직물 원단 재고조회</title>
  <style>
    :root {
      --navy:#132238; --blue:#2457d6; --green:#178c5b; --red:#d54343;
      --orange:#e58b20; --gray:#6b7280; --line:#e5e7eb; --bg:#f6f7f9;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Noto Sans KR",Arial,sans-serif;background:var(--bg);color:#111827}
    header{background:var(--navy);color:#fff;padding:20px 24px;display:flex;justify-content:space-between;align-items:center;gap:16px}
    .brand{font-size:22px;font-weight:800}
    .subtitle{font-size:13px;color:#cbd5e1;margin-top:4px}
    .admin-link,.secondary{border:1px solid rgba(255,255,255,.35);background:transparent;color:#fff;border-radius:10px;padding:9px 13px;cursor:pointer}
    main{max-width:860px;margin:48px auto;padding:0 18px 60px}
    .card{background:#fff;border-radius:20px;padding:28px;box-shadow:0 10px 30px rgba(15,23,42,.08)}
    h1,h2{margin-top:0}
    h1{font-size:28px;margin-bottom:10px}
    .description,.note{color:var(--gray);line-height:1.6}
    .description{margin-bottom:24px}
    .search-row{display:flex;gap:10px}
    input,select,textarea,button{font:inherit}
    input,select,textarea{width:100%;border:1px solid #d1d5db;border-radius:12px;padding:13px 14px;outline:none;background:#fff}
    textarea{min-height:90px;resize:vertical}
    input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(36,87,214,.12)}
    .primary{border:0;background:var(--blue);color:#fff;border-radius:12px;padding:0 20px;cursor:pointer;font-weight:700;white-space:nowrap}
    .result-area{display:none;margin-top:24px}
    .result-title{font-size:14px;color:var(--gray);margin-bottom:10px}
    .result-list{display:grid;gap:12px}
    .result-item{border:1px solid var(--line);border-radius:16px;padding:18px;background:#fff}
    .result-head{display:flex;justify-content:space-between;align-items:center;gap:12px}
    .result-no{font-size:18px;font-weight:800;word-break:break-all}
    .status{font-weight:800;padding:7px 11px;border-radius:999px;font-size:13px;white-space:nowrap}
    .status-in{background:#dcfce7;color:#166534}
    .status-out{background:#fee2e2;color:#991b1b}
    .status-temp{background:#ffedd5;color:#9a3412}
    .details{margin-top:14px;display:grid;gap:8px}
    .detail-row{display:grid;grid-template-columns:92px 1fr;gap:10px;font-size:14px}
    .detail-label{color:var(--gray);font-weight:700}
    .detail-value{white-space:pre-wrap;word-break:break-word}
    .status-none{padding:22px;border-radius:16px;text-align:center;background:#f3f4f6;color:#4b5563;font-weight:700}
    .admin-panel{display:none}
    .admin-actions{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}
    .admin-actions .secondary{color:#1f2937;border-color:#cbd5e1;background:#fff}
    .form-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:12px}
    .full{grid-column:1/-1}
    .field label{display:block;font-size:13px;font-weight:700;color:#475569;margin-bottom:6px}
    .btn-row{display:flex;gap:10px;justify-content:flex-end;margin:16px 0 22px}
    .danger{border:0;background:#ef4444;color:#fff;border-radius:8px;padding:8px 10px;cursor:pointer}
    .table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px}
    table{width:100%;border-collapse:collapse;min-width:760px}
    th,td{padding:13px 14px;border-bottom:1px solid var(--line);text-align:left;font-size:14px;vertical-align:top}
    th{background:#f8fafc;color:#475569}
    tr:last-child td{border-bottom:0}
    .small{font-size:12px;color:var(--gray)}
    .edit-btn{border:1px solid #cbd5e1;background:#fff;border-radius:8px;padding:8px 10px;cursor:pointer}
    .note{margin-top:18px;font-size:13px}
    @media(max-width:640px){
      header{padding:16px} main{margin-top:28px}.card{padding:22px 18px;border-radius:16px}
      h1{font-size:23px}.search-row{flex-direction:column}.primary{min-height:48px}
      .form-grid{grid-template-columns:1fr}.detail-row{grid-template-columns:78px 1fr}
    }
  </style>
</head>
<body>
<header>
  <div>
    <div class="brand">넥스젠/영창직물</div>
    <div class="subtitle">원단 재고조회</div>
  </div>
  <button class="admin-link" id="adminBtn">관리자</button>
</header>

<main>
  <section class="card" id="customerPanel">
    <h1>원단 재고를 조회하세요</h1>
    <div class="description">
      원단번호 전체 또는 일부만 입력해도 조회됩니다.<br>
      예: <strong>VMT26001 → 26001</strong>, <strong>2472U 2/3 → 2/3</strong>
    </div>

    <div class="search-row">
      <input id="searchInput" type="text" placeholder="예: 26001 또는 2/3" autocomplete="off">
      <button class="primary" id="searchBtn">조회하기</button>
    </div>

    <div id="resultArea" class="result-area">
      <div id="resultTitle" class="result-title"></div>
      <div id="resultList" class="result-list"></div>
    </div>

    <div class="note">대소문자와 띄어쓰기를 구분하지 않습니다.</div>
  </section>

  <section class="card admin-panel" id="adminPanel">
    <div class="admin-actions">
      <div>
        <h2 style="margin-bottom:6px">원단 관리</h2>
        <div class="small">상태, 생산 진행, 출고 예정일, 비고를 함께 관리할 수 있습니다.</div>
      </div>
      <button class="secondary" id="backBtn">조회화면으로</button>
    </div>

    <div class="form-grid">
      <div class="field">
        <label for="fabricNo">원단번호</label>
        <input id="fabricNo" type="text" placeholder="예: VMT26001">
      </div>
      <div class="field">
        <label for="fabricStatus">재고 상태</label>
        <select id="fabricStatus">
          <option value="in">있음</option>
          <option value="out">없음</option>
          <option value="temp">일시품절</option>
        </select>
      </div>
      <div class="field">
        <label for="productionStatus">생산 상태</label>
        <select id="productionStatus">
          <option value="">선택 안 함</option>
          <option value="생산 예정">생산 예정</option>
          <option value="생산중">생산중</option>
          <option value="생산 완료">생산 완료</option>
          <option value="입고 예정">입고 예정</option>
          <option value="출고 준비중">출고 준비중</option>
          <option value="출고 완료">출고 완료</option>
          <option value="단종">단종</option>
        </select>
      </div>
      <div class="field">
        <label for="shipDate">출고 예정일</label>
        <input id="shipDate" type="date">
      </div>
      <div class="field full">
        <label for="memo">비고</label>
        <textarea id="memo" placeholder="예: 다음 주 생산 완료 예정 / 7월 25일 출고 예정 / 대체 원단 문의"></textarea>
      </div>
    </div>

    <div class="btn-row">
      <button class="secondary" id="clearBtn">입력 초기화</button>
      <button class="primary" id="saveBtn">등록/수정</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>원단번호</th>
            <th>재고</th>
            <th>생산 상태</th>
            <th>출고 예정일</th>
            <th>비고</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="fabricTable"></tbody>
      </table>
    </div>

    <div class="note">
      현재 버전은 이 브라우저에만 저장됩니다. 다른 컴퓨터나 휴대폰에서도 같은 내용을 보이게 하려면 온라인 데이터베이스 연결이 필요합니다.
    </div>
  </section>
</main>

<script>
  const STORAGE_KEY = "youngchang_fabric_stock_v2";
  const ADMIN_PASSWORD = "1234";

  const defaultData = [
    { no:"VMT26001", status:"in", production:"", shipDate:"", memo:"" },
    { no:"2472U 2/3", status:"temp", production:"생산중", shipDate:"", memo:"다음 생산분 입고 예정" },
    { no:"YC-1003", status:"out", production:"단종", shipDate:"", memo:"대체 원단 문의" }
  ];

  function normalize(v){return String(v||"").trim().toUpperCase().replace(/\s+/g,"")}
  function escapeHtml(v){return String(v||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
  function loadData(){
    const saved=localStorage.getItem(STORAGE_KEY);
    if(!saved){localStorage.setItem(STORAGE_KEY,JSON.stringify(defaultData));return [...defaultData]}
    try{
      return JSON.parse(saved).map(x=>({
        no:x.no||"",status:x.status||"in",production:x.production||"",
        shipDate:x.shipDate||"",memo:x.memo||""
      }))
    }catch{return [...defaultData]}
  }
  let fabrics=loadData();
  let editingOriginalNo="";
  function saveData(){localStorage.setItem(STORAGE_KEY,JSON.stringify(fabrics))}
  const statusText={in:"있음",out:"없음",temp:"일시품절"};
  const statusClass={in:"status-in",out:"status-out",temp:"status-temp"};

  function formatDate(v){
    if(!v)return "";
    const [y,m,d]=v.split("-");
    return `${y}.${m}.${d}`;
  }

  function searchFabric(){
    const query=normalize(document.getElementById("searchInput").value);
    const area=document.getElementById("resultArea");
    const title=document.getElementById("resultTitle");
    const list=document.getElementById("resultList");
    area.style.display="block"; list.innerHTML="";
    if(!query){title.textContent="";list.innerHTML='<div class="status-none">원단번호를 입력해주세요</div>';return}
    const matches=fabrics.filter(x=>normalize(x.no).includes(query)).sort((a,b)=>a.no.localeCompare(b.no,"ko"));
    if(!matches.length){title.textContent="";list.innerHTML='<div class="status-none">조회되는 원단번호가 없습니다</div>';return}
    title.textContent=`검색 결과 ${matches.length}건`;
    matches.forEach(item=>{
      const row=document.createElement("div");
      row.className="result-item";
      const details=[];
      if(item.production) details.push(`<div class="detail-row"><div class="detail-label">생산 상태</div><div class="detail-value">${escapeHtml(item.production)}</div></div>`);
      if(item.shipDate) details.push(`<div class="detail-row"><div class="detail-label">출고 예정일</div><div class="detail-value">${escapeHtml(formatDate(item.shipDate))}</div></div>`);
      if(item.memo) details.push(`<div class="detail-row"><div class="detail-label">비고</div><div class="detail-value">${escapeHtml(item.memo)}</div></div>`);
      row.innerHTML=`
        <div class="result-head">
          <div class="result-no">${escapeHtml(item.no)}</div>
          <div class="status ${statusClass[item.status]}">${statusText[item.status]}</div>
        </div>
        ${details.length?`<div class="details">${details.join("")}</div>`:""}
      `;
      list.appendChild(row);
    })
  }

  function renderTable(){
    const tbody=document.getElementById("fabricTable"); tbody.innerHTML="";
    if(!fabrics.length){tbody.innerHTML='<tr><td colspan="6" style="text-align:center;padding:30px;color:#6b7280">등록된 원단이 없습니다.</td></tr>';return}
    fabrics.slice().sort((a,b)=>a.no.localeCompare(b.no,"ko")).forEach(item=>{
      const tr=document.createElement("tr");
      tr.innerHTML=`
        <td><strong>${escapeHtml(item.no)}</strong></td>
        <td>${statusText[item.status]}</td>
        <td>${escapeHtml(item.production||"-")}</td>
        <td>${escapeHtml(formatDate(item.shipDate)||"-")}</td>
        <td>${escapeHtml(item.memo||"-")}</td>
        <td>
          <button class="edit-btn" data-edit="${escapeHtml(item.no)}">수정</button>
          <button class="danger" data-delete="${escapeHtml(item.no)}">삭제</button>
        </td>`;
      tbody.appendChild(tr);
    });
    document.querySelectorAll("[data-edit]").forEach(btn=>btn.addEventListener("click",e=>{
      const no=e.target.dataset.edit;
      const item=fabrics.find(x=>x.no===no); if(!item)return;
      editingOriginalNo=item.no;
      fabricNo.value=item.no; fabricStatus.value=item.status;
      productionStatus.value=item.production||""; shipDate.value=item.shipDate||""; memo.value=item.memo||"";
      window.scrollTo({top:0,behavior:"smooth"});
    }));
    document.querySelectorAll("[data-delete]").forEach(btn=>btn.addEventListener("click",e=>{
      const no=e.target.dataset.delete;
      if(confirm(no+" 원단을 삭제할까요?")){
        fabrics=fabrics.filter(x=>x.no!==no);saveData();renderTable();clearForm();
      }
    }));
  }

  function clearForm(){
    editingOriginalNo="";
    fabricNo.value=""; fabricStatus.value="in"; productionStatus.value=""; shipDate.value=""; memo.value="";
  }

  searchBtn.addEventListener("click",searchFabric);
  searchInput.addEventListener("keydown",e=>{if(e.key==="Enter")searchFabric()});
  adminBtn.addEventListener("click",()=>{
    const p=prompt("관리자 비밀번호를 입력해주세요.");
    if(p===ADMIN_PASSWORD){customerPanel.style.display="none";adminPanel.style.display="block";renderTable()}
    else if(p!==null)alert("비밀번호가 맞지 않습니다.")
  });
  backBtn.addEventListener("click",()=>{adminPanel.style.display="none";customerPanel.style.display="block"});
  clearBtn.addEventListener("click",clearForm);
  saveBtn.addEventListener("click",()=>{
    const no=fabricNo.value.trim();
    if(!no){alert("원단번호를 입력해주세요.");fabricNo.focus();return}
    const payload={no,status:fabricStatus.value,production:productionStatus.value,shipDate:shipDate.value,memo:memo.value.trim()};
    if(editingOriginalNo){
      const idx=fabrics.findIndex(x=>x.no===editingOriginalNo);
      if(idx>=0)fabrics[idx]=payload;
    }else{
      const idx=fabrics.findIndex(x=>normalize(x.no)===normalize(no));
      if(idx>=0)fabrics[idx]=payload; else fabrics.push(payload);
    }
    saveData();renderTable();clearForm();alert("저장되었습니다.");
  });

  renderTable();
</script>
</body>
</html>
