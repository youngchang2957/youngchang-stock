<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>영창직물 원단 재고조회</title>
  <style>
    :root {
      --navy: #132238;
      --blue: #2457d6;
      --green: #178c5b;
      --red: #d54343;
      --orange: #e58b20;
      --gray: #6b7280;
      --line: #e5e7eb;
      --bg: #f6f7f9;
      --card: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: var(--bg);
      color: #111827;
    }
    header {
      background: var(--navy);
      color: white;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .brand {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .subtitle {
      font-size: 13px;
      color: #cbd5e1;
      margin-top: 4px;
    }
    .admin-link {
      border: 1px solid rgba(255,255,255,.35);
      background: transparent;
      color: white;
      border-radius: 10px;
      padding: 9px 13px;
      cursor: pointer;
      font-size: 13px;
    }
    main {
      max-width: 760px;
      margin: 48px auto;
      padding: 0 18px 60px;
    }
    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, .08);
    }
    h1, h2 { margin-top: 0; }
    h1 { font-size: 28px; margin-bottom: 10px; }
    .description {
      color: var(--gray);
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .search-row {
      display: flex;
      gap: 10px;
    }
    input, select, button {
      font: inherit;
    }
    input, select {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 14px 15px;
      outline: none;
      background: white;
    }
    input:focus, select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(36, 87, 214, .12);
    }
    .primary {
      border: none;
      background: var(--blue);
      color: white;
      border-radius: 12px;
      padding: 0 20px;
      cursor: pointer;
      font-weight: 700;
      white-space: nowrap;
    }
    .result-area {
      display: none;
      margin-top: 24px;
    }
    .result-title {
      font-size: 14px;
      color: var(--gray);
      margin-bottom: 10px;
    }
    .result-list {
      display: grid;
      gap: 10px;
    }
    .result-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
    }
    .result-no {
      font-weight: 800;
      word-break: break-all;
    }
    .status {
      flex: 0 0 auto;
      font-weight: 800;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 13px;
    }
    .status-in { background: #dcfce7; color: #166534; }
    .status-out { background: #fee2e2; color: #991b1b; }
    .status-temp { background: #ffedd5; color: #9a3412; }
    .status-none {
      padding: 22px;
      border-radius: 16px;
      text-align: center;
      background: #f3f4f6;
      color: #4b5563;
      font-weight: 700;
    }

    .admin-panel { display: none; }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr 180px auto;
      gap: 10px;
      margin-bottom: 20px;
    }
    .secondary {
      border: 1px solid #cbd5e1;
      background: white;
      color: #1f2937;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
    }
    .danger {
      border: none;
      background: #ef4444;
      color: white;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
    }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 560px;
    }
    th, td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 14px;
    }
    th { background: #f8fafc; color: #475569; }
    tr:last-child td { border-bottom: 0; }
    .status-select { padding: 8px 10px; border-radius: 8px; }
    .empty {
      text-align: center;
      color: var(--gray);
      padding: 30px;
    }
    .admin-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .note {
      margin-top: 18px;
      color: var(--gray);
      font-size: 13px;
      line-height: 1.6;
    }
    .badge {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    .b-in { background:#dcfce7; color:#166534; }
    .b-out { background:#fee2e2; color:#991b1b; }
    .b-temp { background:#ffedd5; color:#9a3412; }

    @media (max-width: 640px) {
      header { padding: 16px; }
      main { margin-top: 28px; }
      .card { padding: 22px 18px; border-radius: 16px; }
      h1 { font-size: 23px; }
      .search-row { flex-direction: column; }
      .primary { min-height: 50px; }
      .toolbar { grid-template-columns: 1fr; }
      .result-item { align-items: flex-start; }
    }
  </style>
</head>
<body>
<header>
  <div>
    <div class="brand">영창직물</div>
    <div class="subtitle">원단 재고조회</div>
  </div>
  <button class="admin-link" id="adminBtn">관리자</button>
</header>

<main>
  <section class="card" id="customerPanel">
    <h1>원단 재고를 조회하세요</h1>
    <div class="description">
      원단번호 전체 또는 일부만 입력해도 조회됩니다.<br>
      예: <strong>VMT26001 → 26001</strong>, <strong>2472U 2/3 → 2/3</strong>
    </div>

    <div class="search-row">
      <input id="searchInput" type="text" placeholder="예: 26001 또는 2/3" autocomplete="off" />
      <button class="primary" id="searchBtn">조회하기</button>
    </div>

    <div id="resultArea" class="result-area">
      <div id="resultTitle" class="result-title"></div>
      <div id="resultList" class="result-list"></div>
    </div>

    <div class="note">
      대소문자와 띄어쓰기는 구분하지 않습니다. 같은 검색어가 여러 원단번호에 포함되면 모두 표시됩니다.
    </div>
  </section>

  <section class="card admin-panel" id="adminPanel">
    <div class="admin-actions">
      <div>
        <h2 style="margin-bottom:6px;">원단 관리</h2>
        <div style="color:#6b7280;font-size:14px;">원단번호를 등록하고 상태를 변경할 수 있습니다.</div>
      </div>
      <button class="secondary" id="backBtn">조회화면으로</button>
    </div>

    <div class="toolbar">
      <input id="fabricNo" type="text" placeholder="원단번호 입력" />
      <select id="fabricStatus">
        <option value="in">있음</option>
        <option value="out">없음</option>
        <option value="temp">일시품절</option>
      </select>
      <button class="primary" id="addBtn">등록</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>원단번호</th>
            <th>현재 상태</th>
            <th>상태 변경</th>
            <th>삭제</th>
          </tr>
        </thead>
        <tbody id="fabricTable"></tbody>
      </table>
    </div>

    <div class="note">
      현재 버전은 이 브라우저에만 저장됩니다. 다른 기기에서도 같은 데이터를 보려면 추후 온라인 데이터베이스 연결이 필요합니다.
    </div>
  </section>
</main>

<script>
  const STORAGE_KEY = "youngchang_fabric_stock_v2";
  const ADMIN_PASSWORD = "1234";

  const defaultData = [
    { no: "VMT26001", status: "in" },
    { no: "2472U 2/3", status: "temp" },
    { no: "YC-1003", status: "out" }
  ];

  function normalize(value) {
    return value
      .trim()
      .toUpperCase()
      .replace(/\s+/g, "");
  }

  function loadData() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultData));
      return [...defaultData];
    }
    try {
      return JSON.parse(saved);
    } catch {
      return [...defaultData];
    }
  }

  let fabrics = loadData();

  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(fabrics));
  }

  const statusText = {
    in: "있음",
    out: "없음",
    temp: "일시품절"
  };

  const statusClass = {
    in: "status-in",
    out: "status-out",
    temp: "status-temp"
  };

  function searchFabric() {
    const raw = document.getElementById("searchInput").value;
    const query = normalize(raw);
    const area = document.getElementById("resultArea");
    const title = document.getElementById("resultTitle");
    const list = document.getElementById("resultList");

    area.style.display = "block";
    list.innerHTML = "";

    if (!query) {
      title.textContent = "";
      list.innerHTML = '<div class="status-none">원단번호를 입력해주세요</div>';
      return;
    }

    const matches = fabrics
      .filter(item => normalize(item.no).includes(query))
      .sort((a, b) => a.no.localeCompare(b.no, "ko"));

    if (matches.length === 0) {
      title.textContent = "";
      list.innerHTML = '<div class="status-none">조회되는 원단번호가 없습니다</div>';
      return;
    }

    title.textContent = matches.length === 1
      ? "검색 결과 1건"
      : `검색 결과 ${matches.length}건`;

    matches.forEach(item => {
      const row = document.createElement("div");
      row.className = "result-item";
      row.innerHTML = `
        <div class="result-no">${escapeHtml(item.no)}</div>
        <div class="status ${statusClass[item.status]}">${statusText[item.status]}</div>
      `;
      list.appendChild(row);
    });
  }

  function escapeHtml(value) {
    return String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function renderTable() {
    const tbody = document.getElementById("fabricTable");
    tbody.innerHTML = "";

    if (fabrics.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty">등록된 원단이 없습니다.</td></tr>';
      return;
    }

    fabrics
      .slice()
      .sort((a, b) => a.no.localeCompare(b.no, "ko"))
      .forEach(item => {
        const tr = document.createElement("tr");

        const badgeClass =
          item.status === "in" ? "b-in" :
          item.status === "out" ? "b-out" : "b-temp";

        tr.innerHTML = `
          <td><strong>${escapeHtml(item.no)}</strong></td>
          <td><span class="badge ${badgeClass}">${statusText[item.status]}</span></td>
          <td>
            <select class="status-select" data-no="${escapeHtml(item.no)}">
              <option value="in" ${item.status === "in" ? "selected" : ""}>있음</option>
              <option value="out" ${item.status === "out" ? "selected" : ""}>없음</option>
              <option value="temp" ${item.status === "temp" ? "selected" : ""}>일시품절</option>
            </select>
          </td>
          <td><button class="danger" data-delete="${escapeHtml(item.no)}">삭제</button></td>
        `;
        tbody.appendChild(tr);
      });

    document.querySelectorAll(".status-select").forEach(select => {
      select.addEventListener("change", e => {
        const no = e.target.dataset.no;
        const item = fabrics.find(f => f.no === no);
        if (item) {
          item.status = e.target.value;
          saveData();
          renderTable();
        }
      });
    });

    document.querySelectorAll("[data-delete]").forEach(btn => {
      btn.addEventListener("click", e => {
        const no = e.target.dataset.delete;
        if (confirm(no + " 원단을 삭제할까요?")) {
          fabrics = fabrics.filter(f => f.no !== no);
          saveData();
          renderTable();
        }
      });
    });
  }

  document.getElementById("searchBtn").addEventListener("click", searchFabric);
  document.getElementById("searchInput").addEventListener("keydown", e => {
    if (e.key === "Enter") searchFabric();
  });

  document.getElementById("adminBtn").addEventListener("click", () => {
    const password = prompt("관리자 비밀번호를 입력해주세요.");
    if (password === ADMIN_PASSWORD) {
      document.getElementById("customerPanel").style.display = "none";
      document.getElementById("adminPanel").style.display = "block";
      renderTable();
    } else if (password !== null) {
      alert("비밀번호가 맞지 않습니다.");
    }
  });

  document.getElementById("backBtn").addEventListener("click", () => {
    document.getElementById("adminPanel").style.display = "none";
    document.getElementById("customerPanel").style.display = "block";
  });

  document.getElementById("addBtn").addEventListener("click", () => {
    const noInput = document.getElementById("fabricNo");
    const statusInput = document.getElementById("fabricStatus");
    const no = noInput.value.trim();

    if (!no) {
      alert("원단번호를 입력해주세요.");
      noInput.focus();
      return;
    }

    const existing = fabrics.find(f => normalize(f.no) === normalize(no));
    if (existing) {
      existing.no = no;
      existing.status = statusInput.value;
    } else {
      fabrics.push({ no, status: statusInput.value });
    }

    saveData();
    noInput.value = "";
    statusInput.value = "in";
    renderTable();
  });

  renderTable();
</script>
</body>
</html>
